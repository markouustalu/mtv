version: '3.8'

services:
  mtv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtv
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8555:8555"
    
    # Volume mounts
    volumes:
      # Movie library (change to your actual movie path)
      - /path/to/your/movies:/movies:ro
      # Configuration (optional, for custom config)
      - ./config:/app/config:ro
      # Logs (optional, for log persistence)
      - ./logs:/app/logs
    
    # Environment variables (optional, overrides config.yaml)
    environment:
      - MTV_SERVER_HOST=0.0.0.0
      - MTV_SERVER_PORT=8555
      # - MTV_MEDIA_FOLDER=/movies
      # - MTV_PREFER_ENGLISH=true
      # - MTV_LOG_LEVEL=INFO
    
    # Network mode (optional)
    # network_mode: bridge
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
