version: '3.8'

services:
  mtv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtv
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8555:8555"
    
    # Volume mounts
    volumes:
      # Movie library (change to your actual movie path)
      - /path/to/your/movies:/movies:ro
      # Configuration (optional, for custom config)
      - ./config:/app/config:ro
      # Logs (optional, for log persistence)
      - ./logs:/app/logs